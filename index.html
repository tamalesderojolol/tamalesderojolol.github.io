
<!DOCTYPE html>
<html>
<head>
  <title>la página mas inútil del mundo</title>
</head>

<body style="background-image: url(meme-del-gato-riendo.jpg''); background-size: cover; background-repeat: no-repeat;">

  <h1>botones inutiles lol</h1>

  <!-- BOTÓN 1 -->
  <button onclick="mostrarImagen()">
    tamal
  </button>

  <!-- BOTÓN 2 -->
  <button onclick="imagenRebotando()">
    hámster en columpio
  </button>

  <br><br>

  <!-- Imagen normal -->
  <img id="imagen" width="300" style="display:none;">

  <!-- Imagen que rebota -->
  <img id="rebotando" src="hamsterparamipaginatodarara.jpg" width="150"
       style="position:absolute; display:none;">

  <script>
    function mostrarImagen() {
      let img = document.getElementById("imagen");

      img.style.display = "block";
      img.src = "tamales para una pagina web.png";

      setTimeout(function() {
        img.style.display = "none";
      }, 5000);
    }

    function imagenRebotando() {
      let img = document.getElementById("rebotando");

      img.style.display = "block";

      let x = 100;
      let y = 100;
      let dx = 3;
      let dy = 3;

      setInterval(function() {
        x += dx;
        y += dy;

        if (x <= 0 || x >= window.innerWidth - 150) {
          dx = -dx;
        }

        if (y <= 0 || y >= window.innerHeight - 150) {
          dy = -dy;
        }

        img.style.left = x + "px";
        img.style.top = y + "px";
      }, 20);
    }
  </script>

</body>
</html>

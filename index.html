<!DOCTYPE html>
<html>
<head>
  <title> la página mas inútil del mundo </title>
</head>
<body style="background-color: lightblue;">

  <h1> boton que no hace nada </h1>

  <button onclick="mostrarImagen()">
    no me piques
  </button>

  <br><br>

  <img id="imagen" width="300">

  <script>
    function mostrarImagen() {
    let img = document.getElementById("imagen");

    img.style.display = "block";
    img.src = "tamal.jpg";

    setTimeout(function() {
      img.style.display = "none";
    }, 5000);
  }
  </script>

</body>
</html>

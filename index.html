<!DOCTYPE html>
<html>
<head>
  <title>la página mas inútil del mundo</title>
</head>

<body style="text-align:center;">

  <h1>botón inútil</h1>

  <!-- BOTÓN 1 -->
  <button onclick="mostrarImagen()">
    botón de 2 tamales
  </button>

  <!-- BOTÓN 2 -->
  <button onclick="imagenRebotando()">
    boton de hámster en columpio
  </button>

  <br><br>

  <!-- Imagen normal -->
  <img id="tamales para una página web.png" width="300" style="display:none;">

  <!-- Imagen que rebota -->
  <img id="rebotando" src="hamsterparamipaginatodarara.jpg" width="150"
       style="position:absolute; display:none;">

  <script>
    // BOTÓN 1 (tu tamal normal)
    function mostrarImagen() {
      let img = document.getElementById("imagen");

      img.style.display = "block";
      img.src = "tamalesparaunapaginaweb.png";

      setTimeout(function() {
        img.style.display = "none";
      }, 5000);
    }

    // BOTÓN 2 (imagen que rebota)
    function imagenRebotando() {
      let img = document.getElementById("rebotando");

      img.style.display = "block";

      let x = 100;
      let y = 100;
      let dx = 3;
      let dy = 3;

      setInterval(function() {
        x += dx;
        y += dy;

        // Rebote horizontal
        if (x <= 0 || x >= window.innerWidth - 150) {
          dx = -dx;
        }

        // Rebote vertical
        if (y <= 0 || y >= window.innerHeight - 150) {
          dy = -dy;
        }

        img.style.left = x + "px";
        img.style.top = y + "px";
      }, 20);
    }
  </script>

</body>
</html>

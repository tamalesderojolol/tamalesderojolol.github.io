

<!DOCTYPE html>
<html>
<head>
  <title>Hámster</title>
</head>

<body style="
  text-align:center;
  background:black;
  color:white;
">

  <h1>botón inútil</h1>

  <!-- BOTÓN -->
  <button onclick="seguirMouse()">
    hámster en columpio :D
  </button>

  <br><br>

  <!-- Hámster -->
  <img id="hamster" src="hamsterparamipaginatodarara.jpg" width="120"
       style="position:fixed; display:none; pointer-events:none;">

  <script>
    let siguiendo = false;

    function seguirMouse() {
      let hamster = document.getElementById("hamster");

      hamster.style.display = "block";
      siguiendo = true;
    }

    document.addEventListener("mousemove", function(e) {
      if (!siguiendo) return;

      let hamster = document.getElementById("hamster");

      let x = hamster.offsetLeft;
      let y = hamster.offsetTop;

      let dx = (e.clientX - x) * 0.05;
      let dy = (e.clientY - y) * 0.05;

      hamster.style.left = (x + dx) + "px";
      hamster.style.top = (y + dy) + "px";
    });
  </script>

</body>
</html>

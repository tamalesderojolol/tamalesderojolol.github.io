

<!DOCTYPE html>
<html>
<head>
  <title>la página más inútil del mundo</title>
</head>

<body style="
  text-align:center;
  color:white;
  background-image: url('meme-del-gato-riendo.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
">

  <h1>botones inútiles</h1>

  <!-- BOTÓN 1 -->
  <button onclick="mostrarImagen()">
    tamales no se de que sabor
  </button>

  <!-- BOTÓN 2 -->
  <button onclick="imagenRebotando()">
    hámster en columpio
  </button>

  <!-- BOTÓN 3 -->
  <button onclick="jumpscareGato()">
  NO PICARLE
  </button>

  <br><br>

  <!-- Imagen normal -->
  <img id="tamales para una pagina web.png" width="300" style="display:none;">

  <!-- Imagen rebotando -->
  <img id="rebotando" src="hamsterparamipaginatodarara.jpg" width="150"
       style="position:absolute; display:none;">

  <!-- Jumpscare -->
  <img id="jumpscare gato.jpg" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;">

  <script>
    // BOTÓN 1 (tamal)
    function mostrarImagen() {
      let img = document.getElementById("tamales para una pagina web.png");

      img.style.display = "block";
      img.src = "tamales para una pagina web.png";

      setTimeout(function() {
        img.style.display = "none";
      }, 5000);
    }

    // BOTÓN 2 (rebote)
    function imagenRebotando() {
      let img = document.getElementById("hamsterparamipaginatodarara.jpg");

      img.style.display = "block";

      let x = 100;
      let y = 100;
      let dx = 3;
      let dy = 3;

      setInterval(function() {
        x += dx;
        y += dy;

        if (x <= 0 || x >= window.innerWidth - 150) {
          dx = -dx;
        }

        if (y <= 0 || y >= window.innerHeight - 150) {
          dy = -dy;
        }

        img.style.left = x + "px";
        img.style.top = y + "px";
      }, 20);
    }

    // BOTÓN 3 (jumpscare gato)
    function jumpscareGato() {
      let img = document.getElementById("jumpscare gato.jpg");

      img.style.display = "block";
      img.src = "jumpscare gato.jpg"; 

      setTimeout(function() {
        img.style.display = "none";
      }, 1000);
    }
  </script>

</body>
</html>

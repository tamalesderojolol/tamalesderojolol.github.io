


<!DOCTYPE html>
<html>
<head>
  <title>Hámster</title>
</head>

<body style="text-align:center; background:black; color:black;">

  <h1>botón</h1>

  <button onclick="activar()">
  hámster en columpio
  </button>

  <script>
    let hamsters = [];
    let maxHamsters = 100;
    let activo = false;

    function crearHamster(x, y) {
      let img = document.createElement("img");
      img.src = "hamsterparamipaginatodarara.jpg";
      img.width = 80;
      img.style.position = "fixed";
      img.style.left = x + "px";
      img.style.top = y + "px";
      img.style.pointerEvents = "none";

      document.body.appendChild(img);

      hamsters.push({
        element: img,
        x: x,
        y: y
      });
    }

    function activar() {
      if (activo) return;
      activo = true;

      crearHamster(100, 100);
    }

    document.addEventListener("mousemove", function(e) {
      if (!activo) return;

      hamsters.forEach(h => {
        let dx = (e.clientX - h.x) * 0.05;
        let dy = (e.clientY - h.y) * 0.05;

        h.x += dx;
        h.y += dy;

        h.element.style.left = h.x + "px";
        h.element.style.top = h.y + "px";

        // detectar "captura"
        if (
          Math.abs(h.x - e.clientX) < 20 &&
          Math.abs(h.y - e.clientY) < 20 &&
          hamsters.length < maxHamsters
        ) {
          crearHamster(h.x, h.y);
        }
      });
    });
  </script>

</body>
</html>
